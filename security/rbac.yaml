# --- Read-Only Viewer Role ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: cloudops-prod
  name: cloudops-viewer
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]

---
# --- Developer Role (No deletion of core services) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: cloudops-prod
  name: cloudops-developer
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"] # No secret mutation for developers

---
# --- Role Binding Example ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-binding
  namespace: cloudops-prod
subjects:
- kind: User
  name: "bittu@example.com"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: cloudops-developer
  apiGroup: rbac.authorization.k8s.io
