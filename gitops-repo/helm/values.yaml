# Global Values
nameOverride: ""
fullnameOverride: ""

# Backend Configuration
backend:
  replicaCount: 1
  image:
    repository: bittush8789/cloudops-backend
    pullPolicy: IfNotPresent
    tag: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  config:
    projectName: "CloudOps Control Center"
    postgresServer: "postgres"
    postgresDb: "cloudops"
    redisHost: "redis"
    logLevel: "info"
  secrets:
    secretKey: "change-me"
    postgresUser: "postgres"
    postgresPassword: "password"
  rollout:
    enabled: false
    strategy: canary # options: canary, blueGreen

# Frontend Configuration
frontend:
  replicaCount: 1
  image:
    repository: bittush8789/cloudops-frontend
    pullPolicy: IfNotPresent
    tag: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Global Service Configuration
service:
  type: ClusterIP

# Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: cloudops.local
  tls: []

# Autoscaling (HPA)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Security Contexts
podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001

# Service Account
serviceAccount:
  create: true
  annotations: {}

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network Policy
networkPolicy:
  enabled: true
