apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudops-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/bittush8789/cloudops-control-center.git'
    targetRevision: main
    path: gitops-repo/helm
    helm:
      valueFiles:
        - ../prod/values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cloudops-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
