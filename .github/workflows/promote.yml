name: Promote - Environment Promotion

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target Environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - staging
          - prod

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: 'your-org/cloudops-gitops-manifests'
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Promote to ${{ github.event.inputs.target_env }}
        run: |
          cd gitops
          # Logic to copy config from one env folder to another or update helm values
          cp env/dev/values.yaml env/${{ github.event.inputs.target_env }}/values.yaml
          
      - name: Commit and Push
        run: |
          cd gitops
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: promote to ${{ github.event.inputs.target_env }} [skip ci]"
          git push origin main
