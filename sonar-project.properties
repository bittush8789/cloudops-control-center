# Project identification
sonar.projectKey=cloudops-control-center
sonar.projectName=CloudOps Control Center
sonar.projectVersion=1.0.0

# Source paths
sonar.sources=backend/app,frontend/src
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/venv/**,**/__pycache__/**

# Encoding
sonar.sourceEncoding=UTF-8

# Language specific settings
sonar.python.version=3.12
sonar.javascript.environments=browser,node
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Test coverage (placeholders for future integration)
# sonar.python.coverage.reportPaths=backend/coverage.xml
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
