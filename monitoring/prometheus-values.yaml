# kube-prometheus-stack helm values
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

additionalPrometheusRulesMap:
  cloudops-alerts:
    groups:
      - name: CloudOpsAlerts
        rules:
          # --- High CPU Usage ---
          - alert: HighCpuUsage
            expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="cloudops-prod"}) by (pod) > 0.8
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High CPU usage on pod {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} is using more than 80% CPU for 5 minutes."

          # --- High Memory Usage ---
          - alert: HighMemoryUsage
            expr: container_memory_working_set_bytes{namespace="cloudops-prod"} / container_spec_memory_limit_bytes{namespace="cloudops-prod"} > 0.9
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High Memory usage on pod {{ $labels.pod }}"

          # --- Pod CrashLooping ---
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="cloudops-prod"}[15m]) * 60 > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crashlooping"

          # --- High 5xx Errors ---
          - alert: High5xxErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High 5xx error rate detected on {{ $labels.service }}"

          # --- High API Latency ---
          - alert: HighApiLatency
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High API Latency on {{ $labels.service }}"
              description: "95th percentile latency is above 2s."

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity']
      receiver: 'slack-notifications'
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
            channel: '#cloudops-alerts'
