apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudops-ingress
  namespace: cloudops-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: cloudops.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cloudops-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudops-frontend
                port:
                  number: 3000
